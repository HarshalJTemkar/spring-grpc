server: 
  port: ${SERVER_PORT:8080} 
 
spring: 
  application: 
    name: spring-grpc-graphql 
  graphql: 
    graphiql: 
      enabled: true 
    path: /graphql 
 
grpc: 
  client: 
    grpc-server: 
      address: ${GRPC_CLIENT_ADDRESS:static://localhost:9090} 
      negotiation-type: plaintext 
 
management: 
  endpoints: 
    web: 
      exposure: 
        include: health,info,metrics,prometheus 
