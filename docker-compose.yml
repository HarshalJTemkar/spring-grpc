version: '3.8' 
services: 
  postgres: 
    image: postgres:16-alpine 
    environment: 
      POSTGRES_DB: oauthdb 
      POSTGRES_USER: oauthuser 
      POSTGRES_PASSWORD: oauthpass 
    ports: ["5432:5432"] 
    volumes: ["postgres_data:/var/lib/postgresql/data"] 
  redis: 
    image: redis:7-alpine 
    ports: ["6379:6379"] 
  vault: 
    image: hashicorp/vault:1.16 
    environment: 
      VAULT_DEV_ROOT_TOKEN_ID: myroot 
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200 
    ports: ["8200:8200"] 
    cap_add: [IPC_LOCK] 
  grpc-server: 
    build: ./spring-grpc-server 
    ports: ["9090:9090"] 
    depends_on: [postgres, redis, vault] 
    environment: 
      SPRING_PROFILES_ACTIVE: dev 
  graphql-gateway: 
    build: ./spring-grpc-graphql 
    ports: ["8080:8080"] 
    depends_on: [grpc-server] 
    environment: 
      SPRING_PROFILES_ACTIVE: dev 
volumes: 
  postgres_data: 
