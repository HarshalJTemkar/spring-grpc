syntax = "proto3"; 
package common; 
option java_package = "com.springgrpc.grpc.common"; 
option java_outer_classname = "ErrorProto"; 
option java_multiple_files = true; 
 
message ErrorDetail { 
  string code = 1; 
  string message = 2; 
  string field = 3; 
} 
 
message ErrorResponse { 
  string error_code = 1; 
  string error_message = 2; 
  string correlation_id = 3; 
  repeated ErrorDetail details = 4; 
} 
