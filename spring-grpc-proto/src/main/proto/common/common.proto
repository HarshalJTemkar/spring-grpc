syntax = "proto3"; 
package common; 
option java_package = "com.springgrpc.grpc.common"; 
option java_outer_classname = "CommonProto"; 
option java_multiple_files = true; 
 
message PageRequest { 
  int32 page = 1; 
  int32 size = 2; 
  string sort_by = 3; 
  string sort_direction = 4; 
} 
 
message PageInfo { 
  int32 page = 1; 
  int32 size = 2; 
  int64 total_elements = 3; 
  int32 total_pages = 4; 
} 
 
message Timestamp { 
  int64 seconds = 1; 
  int32 nanos = 2; 
} 
