server:
  port: 8081

spring:
  application:
    name: spring-grpc-server
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:oauthdb}
    username: ${DB_USER:oauthuser}
    password: ${DB_PASSWORD:oauthpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}
    security:
      enabled: false

jwt:
  secret: ${JWT_SECRET:default-secret-for-dev-only-change-in-prod-32chars}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
