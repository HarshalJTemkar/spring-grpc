server:
  port: 8081

spring:
  application:
    name: spring-grpc-server
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:oauthdb}
    username: ${DB_USER:oauthuser}
    password: ${DB_PASSWORD:oauthpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9090}
    security:
      enabled: false

# ----------------------------------------------------------------------------
# Authorization toggle (applies to both HTTP and gRPC interceptors).
#   enabled=false -> all requests permitted (no auth checks)
#   enabled=true  -> Bearer JWT required (HTTP non-actuator endpoints + gRPC,
#                    except the oauth.AuthService / oauth.TokenService methods
#                    used to obtain a token in the first place)
# All values can be overridden via environment variables or
# application-<profile>.yml without code changes. No hard-coding - see
# com.springgrpc.server.util.Constants for the defaults.
# ----------------------------------------------------------------------------
security:
  authorization:
    enabled: ${AUTHZ_ENABLED:false}
    header-name: ${AUTHZ_HEADER_NAME:authorization}
    # NOTE: trailing space is significant - must be quoted so YAML does not strip it
    bearer-prefix: "${AUTHZ_BEARER_PREFIX:Bearer }"
    actuator-path-pattern: ${AUTHZ_ACTUATOR_PATTERN:/actuator/**}

jwt:
  secret: ${JWT_SECRET:default-secret-for-dev-only-change-in-prod-32chars}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
